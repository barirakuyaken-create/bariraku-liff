<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ばりラクやけん 台帳</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // 🔑 ここにさっきゲットしたLIFF IDを貼り付ける！
        const LIFF_ID = "2009505407-MJkR60Cy";

        async function main() {
            try {
                // ① LIFFアプリの初期化（起動準備）
                await liff.init({ liffId: LIFF_ID });
                
                // ② ログインチェック
                if (liff.isLoggedIn()) {
                    // ③ ユーザー情報の取得
                    const profile = await liff.getProfile();
                    const userId = profile.userId;
                    
                    // ④ 画面の表示を書き換える（テスト成功の証！）
                    document.getElementById('data-container').innerHTML = `
                        <div class="loading">
                            ✅ LINE連携 大成功ばい！<br><br>
                            ようこそ、${profile.displayName}さん！<br>
                            (ID: ${userId})<br><br>
                            ※次はここにスプレッドシートのデータを表示させるぜ！
                        </div>
                    `;
                } else {
                    // LINE外のブラウザで開いた場合はログイン画面へ
                    liff.login(); 
                }
            } catch (error) {
                console.error("LIFF初期化エラー", error);
                document.getElementById('data-container').innerHTML = `<div class="loading">❌ エラーが発生しましたばい。</div>`;
            }
        }

        // 魔法の実行！
        main();
    </script>
</head>
<body>
    <header>📓 ばりラクやけん 台帳</header>
    
    <div class="container" id="data-container">
        <div class="loading">🔄 データを読み込み中ばい...</div>
        </div>

    <button class="bottom-btn" onclick="alert('エクセル出力は後で繋ぐばい！')">📊 エクセルで出力する</button>

    <script>
        // 後でここに「LINEとの連携」や「GASとの通信」の処理を書いていくぜ！
    </script>
</body>
</html>
